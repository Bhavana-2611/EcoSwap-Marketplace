<!DOCTYPE html>
<html>
<head>
    <title>EcoSwap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #11998e, #38ef7d);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .card {
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            font-weight: bold;
            color: #11998e;
        }

        .btn-custom {
            background-color: #11998e;
            color: white;
            border-radius: 25px;
            padding: 10px 25px;
        }

        .btn-custom:hover {
            background-color: #0e7c6b;
        }
    </style>
</head>

<body>

<div class="card bg-white">
    <h1>♻️ EcoSwap</h1>
    <p class="mt-3">Swap Smart. Save Money. Save Planet.</p>

    <div class="mt-4">
        <a href="/login" class="btn btn-custom m-2">Login</a>
        <a href="/register" class="btn btn-outline-success m-2">Register</a>
    </div>
</div>

</body>
</html>
