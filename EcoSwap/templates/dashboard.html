<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - EcoSwap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #11998e, #38ef7d);
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .card-box {
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        .btn-custom {
            background-color: #11998e;
            color: white;
            border-radius: 25px;
        }

        .btn-custom:hover {
            background-color: #0e7c6b;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card card-box bg-white text-center">

        <h2 class="mb-3">♻️ Welcome, {{ username }} 👋</h2>
        <p class="mb-4">Start swapping products and save the planet 🌍</p>

        <div class="d-grid gap-3">
            <a href="/add_product" class="btn btn-custom">➕ Add Product</a>
            <a href="/marketplace" class="btn btn-outline-success">🌍 View Marketplace</a>
            <a href="/swap_requests" class="btn btn-warning">📩 View Swap Requests</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
<hr class="mt-4">

<h4 class="mt-3">Your Products</h4>

{% if products %}
    <div class="row">
        {% for product in products %}
        <div class="col-md-4 mt-3">
            <div class="card p-3 shadow-sm">
                <h5>{{ product[0] }}</h5>
                <p>{{ product[1] }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
{% else %}
    <p class="text-muted">No products added yet.</p>
{% endif %}

    </div>
</div>

</body>
</html>
