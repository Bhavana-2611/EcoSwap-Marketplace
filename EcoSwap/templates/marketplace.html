<!DOCTYPE html>
<html>
<head>
    <title>Marketplace - EcoSwap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">🌍 EcoSwap Marketplace</h2>

    {% if products %}
    <div class="row">

        {% for product in products %}
        <div class="col-md-4 mt-3">

            <div class="card shadow-sm">

                <img src="/static/images/{{ product[4] }}" class="card-img-top" height="200">

                <div class="card-body">

                    <h5 class="card-title">{{ product[1] }}</h5>

                    <p class="card-text">{{ product[2] }}</p>

                    <p class="text-muted">
                        Owner: {{ product[3] }} <br>
                        Location: {{ product[5] }}
                    </p>

                    <a href="/request_swap/{{ product[0] }}" class="btn btn-success btn-sm">
                        Request Swap
                    </a>

                </div>

            </div>

        </div>
        {% endfor %}

    </div>

    {% else %}
        <p>No products available for swap.</p>
    {% endif %}

    <a href="/dashboard" class="btn btn-secondary mt-4">Back to Dashboard</a>

</div>

</body>
</html>
