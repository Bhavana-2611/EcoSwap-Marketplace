<!DOCTYPE html>
<html>
<head>
    <title>Add Product - EcoSwap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="mb-3">➕ Add New Product</h3>

        <form method="POST" enctype="multipart/form-data">

            <input type="text" name="product_name" class="form-control mb-3" placeholder="Product Name" required>

            <textarea name="description" class="form-control mb-3" placeholder="Product Description" required></textarea>

            <input type="text" name="location" class="form-control mb-3" placeholder="Owner Location" required>

            <input type="file" name="image" class="form-control mb-3" required>

            <button type="submit" class="btn btn-success">Add Product</button>

        </form>

        <a href="/dashboard" class="btn btn-secondary mt-3">Back to Dashboard</a>
    </div>
</div>

</body>
</html>
